- name: Watch for new records
  hosts: localhost
  sources:
    - new_records:
        instance: "{{ SN_HOST }}"
        username: "{{ SN_USERNAME }}"
        password: "{{ SN_PASSWORD }}"
        table: incident
        interval: 1
  rules:
    - name: New record created
      condition: event.sys_id is defined
      action:
        run_job_template:
          name: "print_snow_record_test"
          organisation: "solventum"
